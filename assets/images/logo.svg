<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Transparent background (implicit) -->

  <!-- Outer hexagon - representing algorithms/structure -->
  <polygon
    points="60,6 110,33 110,87 60,114 10,87 10,33"
    fill="none"
    stroke="white"
    stroke-width="4"
    stroke-linejoin="round"
  />

  <!-- Inner code brackets < > representing programming -->
  <text
    x="60"
    y="58"
    font-family="Courier New, monospace"
    font-size="28"
    font-weight="bold"
    fill="white"
    text-anchor="middle"
    dominant-baseline="middle"
  >&lt;/&gt;</text>

  <!-- C# label below -->
  <text
    x="60"
    y="84"
    font-family="Arial, Helvetica, sans-serif"
    font-size="13"
    font-weight="bold"
    fill="white"
    text-anchor="middle"
    dominant-baseline="middle"
    letter-spacing="2"
  >ADS</text>

  <!-- Small dot accent at top of hexagon -->
  <circle cx="60" cy="6" r="3" fill="white" />
</svg>
